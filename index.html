<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Practice 3</title>
<style>
    body{
        background-color:rgb(118, 39, 192);
    }
</style>
</head>
<body>
<h2>JavaScript For Loop</h2>
<p id="sample1"></p> <script>
let Sample1 = "";
for (let x = 0; x < 3; x++) {
  Sample1 += "The number is " + x + "<br>";
}
document.getElementById("sample1").innerHTML = Sample1;
</script>


<h2>JavaScript While Loop</h2>
<p id="sample2"></p> <script>
let Sample2 = "";
let z_while = 0; // Renamed to avoid confusion with the do-while 'z'
while (z_while < 5) {
  Sample2 += "The number is " + z_while + "<br>"; // Fixed: Changed 'y' to 'z_while'
  z_while++;
}
document.getElementById("sample2").innerHTML = Sample2;
</script>


<h2>JavaScript do-While Loop</h2>
<p id="sample3"></p>

<script>
let Sample3 = "";
let z_do = 0; 

do {
  Sample3 += "The number is " + z_do + "<br>";
  z_do++;
}
while (z_do < 5);  

document.getElementById("sample3").innerHTML = Sample3;
</script>


</body>
</html>
